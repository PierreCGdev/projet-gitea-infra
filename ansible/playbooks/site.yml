---
# 1. Hardening SSH + UFW + NTP sur toutes les machines
- name: Common
  hosts: all
  roles:
    - common

# 2. Docker + mount EFS sur les nodes Swarm, monitoring et Traefik
- name: Docker
  hosts: swarm:monitoring:traefik
  roles:
    - docker

# 3. Init Swarm sur manager[0], join sur les autres managers et workers
- name: Swarm
  hosts: swarm
  roles:
    - swarm

# 4. Prometheus + Grafana sur la machine monitoring
- name: Monitoring
  hosts: monitoring
  roles:
    - monitoring

# 5. Traefik sur son EC2 (reverse proxy HTTP + TCP SSH Gitea)
- name: Traefik
  hosts: traefik
  roles:
    - traefik

# 6. Stack Gitea sur le Swarm (lancée depuis manager[0])
- name: Gitea
  hosts: managers[0]
  roles:
    - gitea
