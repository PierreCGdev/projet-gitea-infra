---
# Ouvrir les ports Docker Swarm dans UFW
- name: UFW allow Swarm management (2377/tcp)
  community.general.ufw:
    rule: allow
    port: '2377'
    proto: tcp
  become: true

- name: UFW allow Swarm gossip TCP (7946)
  community.general.ufw:
    rule: allow
    port: '7946'
    proto: tcp
  become: true

- name: UFW allow Swarm gossip UDP (7946)
  community.general.ufw:
    rule: allow
    port: '7946'
    proto: udp
  become: true

- name: UFW allow Swarm overlay network (4789/udp)
  community.general.ufw:
    rule: allow
    port: '4789'
    proto: udp
  become: true

# Vérifier si le node est déjà dans un swarm (idempotence)
# become: true car le groupe docker n'est actif qu'après reconnexion SSH
- name: Check swarm state
  ansible.builtin.command: docker info --format '{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}'
  register: swarm_state
  changed_when: false
  become: true

# Initialiser le swarm sur le premier manager uniquement
- name: Init Docker Swarm
  ansible.builtin.command: docker swarm init --advertise-addr {{ ansible_default_ipv4.address }}
  become: true
  when:
    - inventory_hostname == groups['managers'][0]
    - swarm_state.stdout != 'active'

# Récupérer les tokens depuis manager[0]
- name: Get manager join token
  ansible.builtin.command: docker swarm join-token manager -q
  register: manager_token
  changed_when: false
  become: true
  when: inventory_hostname == groups['managers'][0]

- name: Get worker join token
  ansible.builtin.command: docker swarm join-token worker -q
  register: worker_token
  changed_when: false
  become: true
  when: inventory_hostname == groups['managers'][0]

# Faire rejoindre les autres managers
# hostvars[groups['managers'][0]] accède aux variables enregistrées sur manager[0]
- name: Join as manager
  ansible.builtin.command: >
    docker swarm join
    --token {{ hostvars[groups['managers'][0]]['manager_token']['stdout'] }}
    {{ groups['managers'][0] }}:2377
  become: true
  when:
    - inventory_hostname in groups['managers']
    - inventory_hostname != groups['managers'][0]
    - swarm_state.stdout != 'active'

# Faire rejoindre les workers
- name: Join as worker
  ansible.builtin.command: >
    docker swarm join
    --token {{ hostvars[groups['managers'][0]]['worker_token']['stdout'] }}
    {{ groups['managers'][0] }}:2377
  become: true
  when:
    - inventory_hostname in groups['workers']
    - swarm_state.stdout != 'active'
