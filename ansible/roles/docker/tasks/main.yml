---
# Installation Docker (méthode officielle Docker pour Ubuntu)
- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
  become: true

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  become: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  become: true

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes
  become: true

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: yes
  become: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
  become: true

# Mount EFS — uniquement sur les nodes Swarm (managers + workers)
- name: Install NFS client
  ansible.builtin.apt:
    name: nfs-common
    state: present
  become: true
  when: inventory_hostname in groups['swarm']

- name: Create EFS mount point
  ansible.builtin.file:
    path: /mnt/gitea-data
    state: directory
    mode: '0755'
  become: true
  when: inventory_hostname in groups['swarm']

- name: Mount EFS
  ansible.posix.mount:
    path: /mnt/gitea-data
    src: "{{ efs_dns_name }}:/"
    fstype: nfs4
    opts: nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2
    state: mounted
  become: true
  when: inventory_hostname in groups['swarm']
