---
# Mise à jour du système
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: safe
  become: true

# Hardening SSH — lineinfile pour ne modifier que les lignes nécessaires
# (préserve Include et AuthorizedKeysFile de l'AMI Ubuntu AWS)
- name: Harden SSH — disable root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
  become: true
  notify: Restart SSH

- name: Harden SSH — disable password auth
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  become: true
  notify: Restart SSH

- name: Harden SSH — enable TCP forwarding
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?AllowTcpForwarding'
    line: 'AllowTcpForwarding yes'
  become: true
  notify: Restart SSH

- name: Harden SSH — max auth tries
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?MaxAuthTries'
    line: 'MaxAuthTries 3'
  become: true
  notify: Restart SSH

- name: Harden SSH — keepalive
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ClientAliveInterval'
    line: 'ClientAliveInterval 300'
  become: true
  notify: Restart SSH

# Clé SSH sur le bastion — nécessaire pour que le deploy CI/CD puisse sauter bastion → manager
- name: Deploy SSH private key to bastion
  ansible.builtin.copy:
    src: ~/.ssh/gitea-project
    dest: /home/ubuntu/.ssh/gitea-project
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  become: true
  when: inventory_hostname in groups['bastion']

# UFW — firewall OS (règles de base communes à toutes les machines)
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: UFW default allow outgoing
  community.general.ufw:
    default: allow
    direction: outgoing
  become: true

- name: UFW allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  become: true

- name: UFW default deny incoming
  community.general.ufw:
    default: deny
    direction: incoming
  become: true

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: true
  async: 30
  poll: 0

- name: Wait for SSH after UFW enable
  ansible.builtin.wait_for_connection:
    delay: 5
    timeout: 120

# NTP — synchronisation de l'heure entre les nodes
- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
  become: true

- name: Enable and start chrony
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: yes
  become: true
